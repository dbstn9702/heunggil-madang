<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>흥길마당 - 전통 연희로 여는 흥의 무드</title>
    <style>
        /* 인스타 피드 감성에 맞춘 고급스러운 다크 바이올렛/블랙 디자인 */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            text-align: center;
            padding-top: 150px;
            margin: 0;
        }
        h1 {
            color: #bd599d; /* 전통과 트렌디함이 공존하는 다크 바이올렛 포인트 */
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #cccccc;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background-color: #461d43; /* 큐샵이 추천해준 시그니처 딥 컬러 */
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: 0.3s;
            border: 1px solid #bd599d;
        }
        .btn:hover {
            background-color: #bd599d;
        }
    </style>
</head>
<body>
    <h1>흥길마당</h1>
    <p>국악 · 농악 · 사물놀이를 감각적인 비주얼로 아카이빙하는 공간</p>
    <a class="btn" href="https://www.instagram.com/heunggil_madang/" target="_blank">인스타그램 바로가기</a>
</body>
</html>
